name: Build & Attach Extension

on:
  release:
    types: [published]

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'v') && !startsWith(github.event.release.tag_name, 'models-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Find latest model release tag
        id: models
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} \
            --json tagName --jq '.[] | select(.tagName | startswith("models-")) | .tagName' \
            | head -1)
          if [ -z "$TAG" ]; then
            echo "ERROR: No models-* release found. Create a model release first."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download model files
        run: |
          mkdir -p public/models
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.models.outputs.tag }}"
          for file in detector.onnx ocr.onnx lama_fp32.onnx bubble.onnx ocr_dict.txt; do
            echo "  Downloading $file ..."
            curl -fSL -o "public/models/$file" "$BASE_URL/$file"
          done
          echo "Model files downloaded"

      - name: Build extension
        run: npm run build

      - name: Verify version matches release tag
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION=$(jq -r .version dist/manifest.json)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Release tag version ($TAG_VERSION) != manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Verify model files in dist
        run: |
          for file in detector.onnx ocr.onnx lama_fp32.onnx bubble.onnx ocr_dict.txt; do
            if [ ! -f "dist/models/$file" ]; then
              echo "ERROR: Missing $file in dist/models/"
              exit 1
            fi
          done
          echo "All model files present in dist/models/"

      - name: Create extension zip
        run: |
          cd dist
          zip -r ../ShinobuTranslator.zip .
          cd ..

      - name: Upload zip to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            ShinobuTranslator.zip \
            --repo ${{ github.repository }} \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}